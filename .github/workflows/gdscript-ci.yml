name: GDScript CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.3.4

      - name: Run gdparse (syntax validation)
        run: find scripts scenes -name "*.gd" -print0 | xargs -0 -n1 gdparse

      - name: Run gdlint (style + complexity)
        run: gdlint scripts/ scenes/

      - name: Check gdformat (no diff)
        run: gdformat --check scripts/ scenes/

  godot-validate:
    name: Validate Godot Project
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import project (validates project.godot and scene references)
        run: godot --headless --import

      - name: Check for script errors
        run: |
          godot --headless --check-only --quit-after 10 || \
            (echo "Godot project validation failed" && exit 1)
